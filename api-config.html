<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API配置 - RSNY 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- 侧边栏 -->
        <div class="w-64 bg-black text-white flex flex-col">
            <div class="p-6">
                <h1 class="text-xl font-bold">RSNY 管理后台</h1>
            </div>

            <nav class="flex-1 px-4">
                <ul class="space-y-2">
                    <li>
                        <a href="/admin/" class="block px-4 py-2 rounded hover:bg-gray-800 transition-colors">
                            📊 概览
                        </a>
                    </li>
                    <li>
                        <a href="/admin/products" class="block px-4 py-2 rounded hover:bg-gray-800 transition-colors">
                            🛍️ 商品管理
                        </a>
                    </li>
                    <li>
                        <a href="/admin/users" class="block px-4 py-2 rounded hover:bg-gray-800 transition-colors">
                            👥 用户管理
                        </a>
                    </li>
                    <li>
                        <a href="/admin/homepage" class="block px-4 py-2 rounded hover:bg-gray-800 transition-colors">
                            🏠 首页装修
                        </a>
                    </li>
                    <li>
                        <a href="/admin/api-config" class="block px-4 py-2 rounded bg-gray-800">
                            ⚙️ API配置
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="p-4 border-t border-gray-800">
                <button
                    onclick="window.location.href='/admin/'"
                    class="w-full px-4 py-2 bg-red-600 rounded hover:bg-red-700 transition-colors"
                >
                    🚪 退出登录
                </button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="flex-1 overflow-auto">
            <!-- 顶部栏 -->
            <div class="bg-white shadow-sm p-4">
                <h2 class="text-xl font-bold text-black">API配置</h2>
                <p class="text-sm text-gray-600">管理大模型API密钥和配置 · 修改后点击"保存"按钮生效</p>
            </div>

            <!-- 内容区 -->
            <div class="p-6">
                <!-- 状态提示 -->
                <div id="loadingState" class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-6">
                    <div class="flex items-center">
                        <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-blue-600 mr-3"></div>
                        <span class="text-blue-800">正在加载配置...</span>
                    </div>
                </div>

                <div id="errorState" class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6 hidden">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <span class="text-red-800">❌ <span id="errorMessage">加载失败</span></span>
                        </div>
                        <button onclick="loadConfigs()" class="px-3 py-1 bg-red-600 text-white rounded text-sm">
                            重试
                        </button>
                    </div>
                </div>

                <div id="successState" class="bg-green-50 border border-green-200 rounded-lg p-4 mb-6 hidden">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <span class="text-green-800">✅ 配置加载成功</span>
                        </div>
                        <button onclick="loadConfigs()" class="px-3 py-1 bg-green-600 text-white rounded text-sm">
                            刷新
                        </button>
                    </div>
                </div>

                <!-- 配置列表 -->
                <div class="bg-white rounded-lg shadow-sm">
                    <div class="p-6 border-b border-gray-200">
                        <h3 class="text-lg font-bold text-black">配置项列表</h3>
                        <p class="text-sm text-gray-600 mt-1">点击"编辑"按钮修改配置值</p>
                    </div>
                    
                    <div id="configList" class="p-6">
                        <!-- 动态加载 -->
                        <div class="text-center text-gray-500 py-8">
                            正在加载...
                        </div>
                    </div>
                </div>

                <!-- 操作说明 -->
                <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mt-6">
                    <h4 class="font-bold text-yellow-900 mb-2">📌 使用说明</h4>
                    <ul class="text-sm text-yellow-800 space-y-1">
                        <li>• 点击"编辑"按钮可以修改配置值</li>
                        <li>• 修改后必须点击"保存"按钮才能生效</li>
                        <li>• 刷新页面后会自动加载最新配置</li>
                        <li>• 如需添加新配置项，请联系管理员</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑配置弹窗 -->
    <div id="editModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 w-full max-w-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold text-black mb-4">编辑配置</h3>

            <input
                type="hidden"
                id="editConfigKey"
            >

            <div class="space-y-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">配置键</label>
                    <input
                        type="text"
                        id="editConfigKeyDisplay"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-50"
                        readonly
                    >
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">配置值 *</label>
                    <textarea
                        id="editConfigValue"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md h-40 font-mono text-sm"
                        placeholder="请输入配置值"
                    ></textarea>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
                    <textarea
                        id="editConfigDesc"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md h-20"
                        placeholder="请输入配置描述"
                    ></textarea>
                </div>

                <div class="flex items-center gap-2">
                    <input
                        type="checkbox"
                        id="editIsActive"
                        class="rounded"
                    >
                    <label for="editIsActive" class="text-sm text-gray-700">启用此配置</label>
                </div>
            </div>

            <div class="flex justify-end gap-4">
                <button
                    onclick="closeEditModal()"
                    class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-100"
                >
                    取消
                </button>
                <button
                    onclick="saveEditConfig()"
                    class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700"
                >
                    💾 保存
                </button>
            </div>
        </div>
    </div>

    <script>
        // === FC3 后端适配 ===
        const ADMIN_PASSWORD = 'rsny@1234';
        const _origFetch = window.fetch;
        const FC3_BASE = 'https://tryon-api-qluouziury.cn-hangzhou.fcapp.run';
        window.fetch = function(url, opts) {
            if (!opts) opts = {};
            opts.headers = opts.headers || {};
            let finalUrl = url;
            if (typeof url === 'string' && url.startsWith('/api/')) {
                finalUrl = FC3_BASE + url;
                opts.headers['x-admin-key'] = ADMIN_PASSWORD;
            }
            return _origFetch(finalUrl, opts);
        };
        // 权限检查
        (function() {
            if (localStorage.getItem('adminToken') !== ADMIN_PASSWORD) {
                window.location.href = '/rsny-AI/login.html';
            }
        })();

        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin/login.html';
        }

        // 保存全局配置引用
        let configs = [];

        // 加载配置列表
        async function loadConfigs() {
            const loadingState = document.getElementById('loadingState');
            const errorState = document.getElementById('errorState');
            const successState = document.getElementById('successState');
            
            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            successState.classList.add('hidden');

            try {
                const response = await fetch('/api/admin/api-config');
                const result = await response.json();

                if (result.code === 200) {
                    configs = result.data || [];
                    renderConfigs(configs);
                    
                    loadingState.classList.add('hidden');
                    successState.classList.remove('hidden');
                    
                    console.log('✅ 配置加载成功，共', configs.length, '项');
                } else {
                    throw new Error(result.msg || '加载失败');
                }
            } catch (error) {
                console.error('❌ 加载配置失败:', error);
                
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
                document.getElementById('errorMessage').textContent = error.message;
                
                document.getElementById('configList').innerHTML = `
                    <div class="text-center py-8">
                        <div class="text-red-600 mb-4">加载失败: ${error.message}</div>
                        <button onclick="loadConfigs()" class="px-4 py-2 bg-blue-600 text-white rounded">
                            重新加载
                        </button>
                    </div>
                `;
            }
        }

        // 渲染配置列表
        function renderConfigs(configs) {
            const container = document.getElementById('configList');

            if (!configs || configs.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        暂无配置数据
                    </div>
                `;
                return;
            }

            // 分类配置
            const apiConfigs = configs.filter(c => 
                ['api_endpoint', 'api_key', 'model_name'].includes(c.config_key)
            );
            const promptConfigs = configs.filter(c => 
                c.config_key.startsWith('prompt_')
            );
            const otherConfigs = configs.filter(c => 
                !['api_endpoint', 'api_key', 'model_name'].includes(c.config_key) && 
                !c.config_key.startsWith('prompt_')
            );

            let html = '';

            // API配置区域
            if (apiConfigs.length > 0) {
                html += `
                    <div class="mb-6">
                        <h4 class="text-base font-semibold text-gray-900 mb-3 pb-2 border-b border-gray-200">
                            🔑 API 基础配置
                        </h4>
                        <div class="space-y-3">
                            ${renderConfigItems(apiConfigs)}
                        </div>
                    </div>
                `;
            }

            // 提示词配置区域
            if (promptConfigs.length > 0) {
                html += `
                    <div class="mb-6">
                        <h4 class="text-base font-semibold text-gray-900 mb-3 pb-2 border-b border-gray-200">
                            💬 提示词配置
                        </h4>
                        <div class="space-y-3">
                            ${renderConfigItems(promptConfigs)}
                        </div>
                    </div>
                `;
            }

            // 其他配置区域
            if (otherConfigs.length > 0) {
                html += `
                    <div class="mb-6">
                        <h4 class="text-base font-semibold text-gray-900 mb-3 pb-2 border-b border-gray-200">
                            ⚙️ 其他配置
                        </h4>
                        <div class="space-y-3">
                            ${renderConfigItems(otherConfigs)}
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // 渲染配置项
        function renderConfigItems(items) {
            return items.map(config => {
                const displayValue = getDisplayValue(config);
                const statusBadge = config.is_active 
                    ? '<span class="px-2 py-1 text-xs bg-green-100 text-green-800 rounded">已启用</span>'
                    : '<span class="px-2 py-1 text-xs bg-gray-100 text-gray-800 rounded">已禁用</span>';

                return `
                    <div class="bg-gray-50 rounded-lg p-4 hover:bg-gray-100 transition-colors">
                        <div class="flex items-start justify-between gap-4">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="font-medium text-gray-900">${getConfigLabel(config.config_key)}</span>
                                    ${statusBadge}
                                </div>
                                <div class="text-sm text-gray-600 mb-2">
                                    <span class="text-gray-500">键名:</span> 
                                    <code class="bg-white px-2 py-1 rounded text-xs">${config.config_key}</code>
                                </div>
                                <div class="bg-white rounded p-3 border border-gray-200">
                                    <div class="text-sm text-gray-500 mb-1">当前值:</div>
                                    <div class="text-sm font-mono text-gray-900 break-all">${displayValue}</div>
                                </div>
                                ${config.description ? `
                                    <div class="text-xs text-gray-500 mt-2">
                                        📝 ${config.description}
                                    </div>
                                ` : ''}
                            </div>
                            <div class="flex flex-col gap-2">
                                <button
                                    onclick="editConfig('${config.config_key}')"
                                    class="px-3 py-1.5 bg-blue-600 text-white rounded text-sm hover:bg-blue-700 whitespace-nowrap"
                                >
                                    ✏️ 编辑
                                </button>
                                <button
                                    onclick="toggleStatus('${config.config_key}', ${!config.is_active})"
                                    class="px-3 py-1.5 ${config.is_active ? 'bg-red-100 text-red-700 hover:bg-red-200' : 'bg-green-100 text-green-700 hover:bg-green-200'} rounded text-sm whitespace-nowrap"
                                >
                                    ${config.is_active ? '🚫 禁用' : '✅ 启用'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 获取配置显示值
        function getDisplayValue(config) {
            if (!config.config_value) {
                return '<span class="text-gray-400 italic">未设置</span>';
            }

            // API Key 需要脱敏
            if (config.config_key === 'api_key') {
                const key = config.config_value;
                if (key.length > 14) {
                    return `${key.substring(0, 10)}••••••••${key.substring(key.length - 4)}`;
                }
                return '••••••••';
            }

            // 长文本截断显示
            if (config.config_value.length > 200) {
                return `${config.config_value.substring(0, 200)}<span class="text-gray-400">...</span>`;
            }

            return config.config_value;
        }

        // 获取配置标签
        function getConfigLabel(key) {
            const labels = {
                'api_endpoint': 'API 地址',
                'api_key': 'API Key',
                'model_name': '模型名称',
                'prompt_necklace': '项链提示词',
                'prompt_ring': '戒指提示词',
                'prompt_earring': '耳饰提示词',
                'prompt_bracelet': '手链提示词'
            };
            return labels[key] || key;
        }

        // 编辑配置
        function editConfig(key) {
            const config = configs.find(c => c.config_key === key);
            if (!config) {
                alert('找不到配置项');
                return;
            }

            document.getElementById('editConfigKey').value = config.config_key;
            document.getElementById('editConfigKeyDisplay').value = `${getConfigLabel(config.config_key)} (${config.config_key})`;
            document.getElementById('editConfigValue').value = config.config_value || '';
            document.getElementById('editConfigDesc').value = config.description || '';
            document.getElementById('editIsActive').checked = config.is_active !== false;

            document.getElementById('editModal').classList.remove('hidden');
        }

        // 保存编辑
        async function saveEditConfig() {
            const key = document.getElementById('editConfigKey').value;
            const configValue = document.getElementById('editConfigValue').value;
            const description = document.getElementById('editConfigDesc').value;
            const isActive = document.getElementById('editIsActive').checked;

            if (!configValue) {
                alert('请填写配置值');
                return;
            }

            const data = {
                config_value: configValue,
                description: description,
                is_active: isActive,
            };

            try {
                const response = await fetch(`/api/admin/api-config/${key}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });

                const result = await response.json();

                if (result.code === 200) {
                    alert('✅ 保存成功');
                    closeEditModal();
                    await loadConfigs();
                } else {
                    alert('❌ ' + (result.msg || '保存失败'));
                }
            } catch (error) {
                console.error('保存失败:', error);
                alert('❌ 保存失败: ' + error.message);
            }
        }

        // 切换状态
        async function toggleStatus(key, newStatus) {
            const config = configs.find(c => c.config_key === key);
            if (!config) {
                alert('找不到配置项');
                return;
            }

            const data = { 
                config_value: config.config_value,
                description: config.description,
                is_active: newStatus 
            };

            try {
                const response = await fetch(`/api/admin/api-config/${key}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });

                const result = await response.json();

                if (result.code === 200) {
                    alert(newStatus ? '✅ 已启用' : '✅ 已禁用');
                    await loadConfigs();
                } else {
                    alert('❌ ' + (result.msg || '操作失败'));
                }
            } catch (error) {
                console.error('操作失败:', error);
                alert('❌ 操作失败: ' + error.message);
            }
        }

        // 关闭编辑弹窗
        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        // 页面加载时执行
        loadConfigs();
    </script>
</body>
</html>
