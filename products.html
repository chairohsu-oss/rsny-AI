    <script>
    
    // ===== FC3 后端适配 =====
    const ADMIN_PASSWORD = 'rsny@1234';
    const FC3_BASE = 'https://tryon-api-qluouziury.cn-hangzhou.fcapp.run';
    const _origFetch = window.fetch;
    window.fetch = function(url, opts) {
      if (!opts) opts = {};
      opts.headers = opts.headers || {};
      let finalUrl = url;
      // 相对路径 /api/... 自动补全为 FC3 绝对 URL + 注入认证头
      if (typeof url === 'string' && url.startsWith('/api/')) {
        finalUrl = FC3_BASE + url;
        opts.headers['x-admin-key'] = ADMIN_PASSWORD;
      }
      return _origFetch(finalUrl, opts);
    };

    // 权限检查
    (function() {
      if (localStorage.getItem('adminToken') !== ADMIN_PASSWORD) {
        window.location.href = 'login.html';
      }
    })();
    
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin/login.html';
        }

        let currentEditId = null;
        let uploadedImages = ['', '', '', '', '']; // 存储上传的图片URL

        // 触发文件选择
        function triggerUpload(index) {
            document.getElementById(`fileInput-${index}`).click();
        }

        // 处理文件选择
        async function handleFileSelect(event, index) {
            const file = event.target.files[0];
            if (!file) return;

            // 显示loading
            document.getElementById(`loading-${index}`).classList.remove('hidden');
            document.getElementById(`uploadBox-${index}`).classList.add('uploading');

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('/api/admin/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.code === 200 && result.data) {
                    const url = result.data.url;
                    uploadedImages[index] = url;

                    // 显示预览
                    const preview = document.getElementById(`preview-${index}`);
                    preview.src = url;
                    preview.classList.remove('hidden');
                    document.getElementById(`placeholder-${index}`).classList.add('hidden');

                    // 显示URL
                    const urlContainer = document.getElementById(`urlContainer-${index}`);
                    const urlText = document.getElementById(`urlText-${index}`);
                    urlText.textContent = url.length > 50 ? url.substring(0, 50) + '...' : url;
                    urlContainer.classList.remove('hidden');

                    // 显示删除按钮
                    document.getElementById(`removeBtn-${index}`).classList.remove('hidden');

                    // 更新上传框样式
                    document.getElementById(`uploadBox-${index}`).classList.add('has-image');
                } else {
                    alert('上传失败：' + (result.msg || '未知错误'));
                }
            } catch (error) {
                console.error('上传错误:', error);
                alert('上传失败，请重试');
            } finally {
                // 隐藏loading
                document.getElementById(`loading-${index}`).classList.add('hidden');
                document.getElementById(`uploadBox-${index}`).classList.remove('uploading');
            }
        }

        // 删除图片
        function removeImage(event, index) {
            event.stopPropagation();
            uploadedImages[index] = '';

            // 重置预览
            const preview = document.getElementById(`preview-${index}`);
            preview.src = '';
            preview.classList.add('hidden');
            document.getElementById(`placeholder-${index}`).classList.remove('hidden');

            // 隐藏URL和删除按钮
            document.getElementById(`urlContainer-${index}`).classList.add('hidden');
            document.getElementById(`removeBtn-${index}`).classList.add('hidden');

            // 重置样式
            document.getElementById(`uploadBox-${index}`).classList.remove('has-image');

            // 清空文件输入
            document.getElementById(`fileInput-${index}`).value = '';
        }

        // 复制URL
        function copyUrl(index) {
            const url = uploadedImages[index];
            if (url) {
                navigator.clipboard.writeText(url).then(() => {
                    alert('URL已复制到剪贴板');
                }).catch(() => {
                    // 降级方案
                    const input = document.createElement('input');
                    input.value = url;
                    document.body.appendChild(input);
                    input.select();
                    document.execCommand('copy');
                    document.body.removeChild(input);
                    alert('URL已复制到剪贴板');
                });
            }
        }

        // 加载商品列表
        async function loadProducts() {
            const category = document.getElementById('categoryFilter').value;
            const url = category
                ? `/api/admin/products?category=${category}&pageSize=200`
                : '/api/admin/products?pageSize=200';

            try {
                const response = await fetch(url);
                const result = await response.json();

                if (result.code === 200) {
                    // 兼容分页格式 {items:[], total} 和数组格式
                    const products = Array.isArray(result.data) ? result.data : (result.data?.items || []);
                    renderProducts(products);
                }
            } catch (error) {
                alert('加载商品列表失败');
            }
        }

        // 渲染商品列表
        function renderProducts(products) {
            const tbody = document.getElementById('productList');

            if (!products || products.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="px-4 py-8 text-center text-gray-500">暂无商品</td></tr>';
                return;
            }

            tbody.innerHTML = products.map(product => {
                let images = [];
                try {
                    images = product.images ? JSON.parse(product.images) : [];
                } catch (e) {
                    images = product.image_url ? [product.image_url] : [];
                }
                const firstImage = images[0] || product.image_url || '';

                const categoryNames = {
                    earring: '耳饰',
                    necklace: '项链',
                    ring: '戒指',
                    bracelet: '手链',
                    bangle: '手镯',
                    sunglasses: '墨镜',
                    bag: '包袋',
                    hat: '帽子',
                    belt: '腰带',
                    hair_accessory: '发饰',
                };

                const statusText = product.is_active ? '<span class="text-green-600">上架</span>' : '<span class="text-gray-400">下架</span>';

                return `
                    <tr>
                        <td class="px-4 py-3">
                            <input type="checkbox" class="product-checkbox w-4 h-4 cursor-pointer" data-id="${product.id}" onchange="updateSelectedCount()">
                        </td>
                        <td class="px-4 py-3">
                            ${firstImage ? `<img src="${firstImage}" class="w-12 h-12 object-cover rounded" alt="商品图片">` : '<div class="w-12 h-12 bg-gray-200 rounded"></div>'}
                        </td>
                        <td class="px-4 py-3 text-sm text-gray-600 font-mono">${product.product_code || '-'}</td>
                        <td class="px-4 py-3 text-sm text-black">${product.name}</td>
                        <td class="px-4 py-3 text-sm text-gray-600">${categoryNames[product.category] || product.category}</td>
                        <td class="px-4 py-3 text-sm text-black">¥${product.price}</td>
                        <td class="px-4 py-3 text-sm">${statusText}</td>
                        <td class="px-4 py-3">
                            <button
                                onclick="editProduct('${product.id}')"
                                class="px-2 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700 mr-2"
                            >
                                编辑
                            </button>
                            <button
                                onclick="deleteProduct('${product.id}')"
                                class="px-2 py-1 text-sm bg-red-600 text-white rounded hover:bg-red-700"
                            >
                                删除
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
            
            // 重置全选状态
            document.getElementById('selectAll').checked = false;
            updateSelectedCount();
        }

        // 显示新增弹窗
        function showAddModal() {
            currentEditId = null;
            uploadedImages = ['', '', '', '', ''];

            document.getElementById('modalTitle').textContent = '新增商品';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productCategory').value = 'earrings';
            document.getElementById('productSortOrder').value = '0';
            document.getElementById('hiddenImage').value = '';
            document.getElementById('jumpUrl').value = '';
            document.getElementById('jumpAppId').value = '';
            document.getElementById('youzanUrl').value = '';
            document.getElementById('youzanId').value = '';
            document.getElementById('productDescription').value = '';

            // 重置所有图片上传框
            for (let i = 0; i < 5; i++) {
                const preview = document.getElementById(`preview-${i}`);
                preview.src = '';
                preview.classList.add('hidden');
                document.getElementById(`placeholder-${i}`).classList.remove('hidden');
                document.getElementById(`urlContainer-${i}`).classList.add('hidden');
                document.getElementById(`removeBtn-${i}`).classList.add('hidden');
                document.getElementById(`uploadBox-${i}`).classList.remove('has-image');
                document.getElementById(`fileInput-${i}`).value = '';
            }

            document.getElementById('productModal').classList.remove('hidden');
        }

        // 编辑商品
        async function editProduct(id) {
            try {
                const response = await fetch(`/api/products/${id}`);
                const result = await response.json();

                if (result.code === 200 && result.data) {
                    const product = result.data;
                    currentEditId = id;

                    document.getElementById('modalTitle').textContent = '编辑商品';
                    document.getElementById('productName').value = product.name;
                    document.getElementById('productPrice').value = product.price;
                    document.getElementById('productCategory').value = product.category;
                    document.getElementById('productSortOrder').value = product.sort_order || 0;
                    document.getElementById('hiddenImage').value = product.hidden_image_url || '';
                    document.getElementById('jumpUrl').value = product.jump_url || '';
                    document.getElementById('jumpAppId').value = product.jump_app_id || '';
                    document.getElementById('youzanUrl').value = product.youzan_url || '';
                    document.getElementById('youzanId').value = product.youzan_product_id || '';
                    document.getElementById('productDescription').value = product.description || '';

                    // 解析已有图片
                    let images = [];
                    try {
                        images = product.images ? JSON.parse(product.images) : [];
                    } catch (e) {
                        images = product.image_url ? [product.image_url] : [];
                    }

                    // 填充图片
                    for (let i = 0; i < 5; i++) {
                        const url = images[i] || '';
                        uploadedImages[i] = url;

                        if (url) {
                            const preview = document.getElementById(`preview-${i}`);
                            preview.src = url;
                            preview.classList.remove('hidden');
                            document.getElementById(`placeholder-${i}`).classList.add('hidden');

                            const urlText = document.getElementById(`urlText-${i}`);
                            urlText.textContent = url.length > 50 ? url.substring(0, 50) + '...' : url;
                            document.getElementById(`urlContainer-${i}`).classList.remove('hidden');
                            document.getElementById(`removeBtn-${i}`).classList.remove('hidden');
                            document.getElementById(`uploadBox-${i}`).classList.add('has-image');
                        } else {
                            const preview = document.getElementById(`preview-${i}`);
                            preview.src = '';
                            preview.classList.add('hidden');
                            document.getElementById(`placeholder-${i}`).classList.remove('hidden');
                            document.getElementById(`urlContainer-${i}`).classList.add('hidden');
                            document.getElementById(`removeBtn-${i}`).classList.add('hidden');
                            document.getElementById(`uploadBox-${i}`).classList.remove('has-image');
                        }
                    }

                    document.getElementById('productModal').classList.remove('hidden');
                }
            } catch (error) {
                alert('加载商品信息失败');
            }
        }

        // 保存商品
        async function saveProduct() {
            const name = document.getElementById('productName').value;
            const price = parseInt(document.getElementById('productPrice').value);
            const category = document.getElementById('productCategory').value;
            const sortOrder = parseInt(document.getElementById('productSortOrder').value) || 0;
            const hiddenImageUrl = document.getElementById('hiddenImage').value;
            const jumpUrl = document.getElementById('jumpUrl').value;
            const youzanUrl = document.getElementById('youzanUrl').value;
            const youzanId = document.getElementById('youzanId').value;
            const description = document.getElementById('productDescription').value;

            if (!name || !price) {
                alert('请填写必填项');
                return;
            }

            // 过滤空URL，只保留有效图片
            const validImages = uploadedImages.filter(url => url && url.trim() !== '');
            const imagesJson = JSON.stringify(validImages);
            const mainImageUrl = validImages[0] || '';

            const data = {
                id: currentEditId || generateId(),
                name,
                price,
                category,
                image_url: mainImageUrl,
                image_key: mainImageUrl,
                images: imagesJson,
                hidden_image_url: hiddenImageUrl,
                jump_url: jumpUrl,
                jump_app_id: document.getElementById('jumpAppId').value || null,
                youzan_url: youzanUrl,
                youzan_product_id: youzanId,
                description,
                sort_order: sortOrder,
            };

            try {
                const url = currentEditId ? `/api/admin/products/${currentEditId}` : '/api/admin/products';
                const method = currentEditId ? 'PUT' : 'POST';

                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data),
                });

                const result = await response.json();

                if (result.code === 200) {
                    alert(currentEditId ? '更新成功' : '创建成功');
                    closeModal();
                    loadProducts();
                } else {
                    alert(result.msg || '操作失败');
                }
            } catch (error) {
                alert('操作失败');
            }
        }

        // 删除商品
        async function deleteProduct(id) {
            if (!confirm('确定要删除这个商品吗？')) {
                return;
            }

            try {
                const response = await fetch(`/api/admin/products/${id}`, {
                    method: 'DELETE',
                });

                const result = await response.json();

                if (result.code === 200) {
                    alert('删除成功');
                    loadProducts();
                } else {
                    alert(result.msg || '删除失败');
                }
            } catch (error) {
                alert('删除失败');
            }
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
        }

        // 生成ID
        function generateId() {
            return 'prod-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        // 导出Excel
        function exportExcel() {
            alert('Excel导出功能开发中...');
        }

        // 全选/取消全选
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.product-checkbox');
            checkboxes.forEach(cb => cb.checked = selectAll.checked);
            updateSelectedCount();
        }

        // 更新选中计数
        function updateSelectedCount() {
            const checkboxes = document.querySelectorAll('.product-checkbox:checked');
            const count = checkboxes.length;
            const batchActions = document.getElementById('batchActions');
            const selectedCount = document.getElementById('selectedCount');
            
            if (count > 0) {
                batchActions.classList.remove('hidden');
                selectedCount.textContent = `已选中 ${count} 项`;
            } else {
                batchActions.classList.add('hidden');
            }
            
            // 更新全选框状态
            const allCheckboxes = document.querySelectorAll('.product-checkbox');
            const selectAll = document.getElementById('selectAll');
            selectAll.checked = allCheckboxes.length > 0 && count === allCheckboxes.length;
        }

        // 获取选中的商品ID列表
        function getSelectedIds() {
            const checkboxes = document.querySelectorAll('.product-checkbox:checked');
            return Array.from(checkboxes).map(cb => cb.dataset.id);
        }

        // 批量更新上下架状态
        async function batchUpdateStatus(isActive) {
            const ids = getSelectedIds();
            if (ids.length === 0) {
                alert('请先选择商品');
                return;
            }
            
            const action = isActive ? '上架' : '下架';
            if (!confirm(`确定要批量${action} ${ids.length} 个商品吗？`)) {
                return;
            }

            try {
                const response = await fetch('/api/admin/products/batch-status', {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ ids, is_active: isActive }),
                });

                const result = await response.json();
                if (result.code === 200) {
                    alert(`批量${action}成功`);
                    loadProducts();
                } else {
                    alert(result.msg || `批量${action}失败`);
                }
            } catch (error) {
                alert(`批量${action}失败`);
            }
        }

        // 批量删除
        async function batchDelete() {
            const ids = getSelectedIds();
            if (ids.length === 0) {
                alert('请先选择商品');
                return;
            }
            
            if (!confirm(`确定要批量删除 ${ids.length} 个商品吗？此操作不可恢复！`)) {
                return;
            }

            try {
                const response = await fetch('/api/admin/products/batch-delete', {
                    method: 'DELETE',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ ids }),
                });

                const result = await response.json();
                if (result.code === 200) {
                    alert('批量删除成功');
                    loadProducts();
                } else {
                    alert(result.msg || '批量删除失败');
                }
            } catch (error) {
                alert('批量删除失败');
            }
        }

        // 初始化
        loadProducts();
    </script>
</body>
</html>
