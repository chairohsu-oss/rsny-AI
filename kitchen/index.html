  <style>

<body>
  <div id="app">
    <div class="__app-loading">
      <div class="__app-loading-icon">
        <img src="/loading-logo.png" alt="天霸私厨" style="width: 60px; height: 60px; object-fit: contain;">
      </div>
      <span class="__app-loading-text">天霸私厨</span>
    </div>
  </div>
  
  <script>
    // 禁用双击缩放
    document.addEventListener('touchstart', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
    
    var lastTouchEnd = 0;
    document.addEventListener('touchend', function(e) {
      var now = Date.now();
      if (now - lastTouchEnd <= 300) e.preventDefault();
      lastTouchEnd = now;
    }, false);
    
    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    });
  </script>
