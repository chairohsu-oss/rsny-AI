<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RSNY 管理后台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
*{scrollbar-width:thin}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f3f4f6}
.si{transition:all .2s}.si:hover,.si.ac{background:rgba(255,255,255,.1)}
.cd{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.bp{background:#111;color:#fff;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;border:none}.bp:hover{opacity:.85}.bp:disabled{opacity:.5;cursor:not-allowed}
.bs{background:#f3f4f6;color:#111;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;border:none}.bs:hover{background:#e5e7eb}
.bd{background:#fee2e2;color:#dc2626;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;border:none}
.bg2{background:#dcfce7;color:#166534;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;border:none}
.bw{background:#fef3c7;color:#92400e;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;border:none}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.mb{background:#fff;border-radius:16px;width:90%;max-width:850px;max-height:90vh;overflow-y:auto;padding:24px}
.fi{width:100%;padding:10px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none}.fi:focus{border-color:#111}
.fl{font-size:13px;color:#6b7280;margin-bottom:6px;display:block;font-weight:500}
.bdg{padding:2px 8px;border-radius:999px;font-size:12px;font-weight:500}
.bdg-g{background:#dcfce7;color:#166534}.bdg-y{background:#f3f4f6;color:#6b7280}.bdg-r{background:#fee2e2;color:#dc2626}.bdg-b{background:#dbeafe;color:#1e40af}.bdg-w{background:#fef3c7;color:#92400e}
.tst{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;color:#fff;font-size:14px;z-index:200;animation:sI .3s ease}
.tst-s{background:#22c55e}.tst-e{background:#ef4444}.tst-i{background:#3b82f6}
@keyframes sI{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.ld{display:inline-block;width:16px;height:16px;border:2px solid #e5e7eb;border-top-color:#111;border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.si2{padding:8px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;min-width:200px}.si2:focus{border-color:#111}
.sl2{padding:8px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;outline:none;background:#fff}
.is{position:relative;width:112px;height:144px;border:2px dashed #d1d5db;border-radius:8px;overflow:hidden;cursor:pointer;background:#fafafa;transition:border-color .2s}
.is:hover{border-color:#60a5fa}.is img{width:100%;height:100%;object-fit:cover}
.is .rb{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,.6);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;cursor:pointer;line-height:1}
.is .mt{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.5);text-align:center;color:#fff;font-size:11px;padding:2px 0}
</style>
</head>
<body><div id="app"></div>
<script>
/* ============ CONFIG ============ */
const SU='https://iwczepxmfjfqpdyiilrq.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3Y3plcHhtZmpmcXBkeWlpbHJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MzcyMTQsImV4cCI6MjA5MTExMzIxNH0.m-_299ReoSkyVeptH2v9fb2IjCRwPnLUWoJATrmrKeU';
const AB='https://tryon-api-qluouziury.cn-hangzhou.fcapp.run';
const AK='rsny@1234';
const CN={necklace:'项链',ring:'戒指',earring:'耳饰',bracelet:'手链',bangle:'手镯',sunglasses:'墨镜',bag:'包袋',hat:'帽子',belt:'腰带',hair_accessory:'发饰'};
const CO=Object.entries(CN).map(([v,l])=>({value:v,label:l}));
const CM={'项链':'necklace','戒指':'ring','耳饰':'earring','手链':'bracelet','手镯':'bangle','墨镜':'sunglasses','包袋':'bag','帽子':'hat','腰带':'belt','发饰':'hair_accessory'};

/* ============ STATE ============ */
let pg='dashboard';
let P={l:[],t:0,p:1,ps:30},U={l:[],t:0,p:1,ps:30},R={l:[],t:0,p:1,ps:50},AL={l:[],t:0,p:1,ps:50};
let CF=[],ST={},PC=[];
let pS='',pC='',pSt='',selP=new Set(),uS='';
let editP=null,editImgs=[],editMainImg='',editHiddenImg='';

/* ============ API UTILS ============ */
const H={'apikey':SK,'Authorization':'Bearer '+SK,'Accept':'application/json','Prefer':'count=exact'};
const HM={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'};

async function sq(t,p={}){
  let u=SU+'/rest/v1/'+t;const q=[];
  if(p.s)q.push('select='+encodeURIComponent(p.s));if(p.l)q.push('limit='+p.l);if(p.o)q.push('offset='+p.o);
  if(p.od)q.push('order='+encodeURIComponent(p.od));
  if(p.w){for(const[k,v]of Object.entries(p.w)){if(v!==undefined&&v!==null&&v!=='')q.push(k+'=eq.'+encodeURIComponent(v))}}
  if(p.lk){for(const[k,v]of Object.entries(p.lk)){if(v)q.push(k+'=ilike.*'+encodeURIComponent(v)+'*')}}
  if(p.ge){for(const[k,v]of Object.entries(p.ge)){if(v)q.push(k+'=gte.'+encodeURIComponent(v))}}
  if(q.length)u+='?'+q.join('&');
  const r=await fetch(u,{headers:H});const d=await r.json();const c=r.headers.get('content-range')?.match(/\/(\d+)/)?.[1];
  if(d&&d.error)return{error:d.error,data:[],count:0};return{data:Array.isArray(d)?d:[],count:parseInt(c||'0')};
}
async function sm(t,m,d,w){
  let u=SU+'/rest/v1/'+t;if(w)u+='?'+w.c+'=eq.'+encodeURIComponent(w.v);
  const r=await fetch(u,{method:m,headers:HM,body:JSON.stringify(d)});const x=await r.json().catch(()=>({}));
  if(x&&x.error)return{error:x.error};return{data:x};
}
async function fcApi(path,opts={}){
  const r=await fetch(AB+path,{method:opts.method||'GET',headers:{'Content-Type':'application/json','x-admin-key':AK,...(opts.h||{})},body:opts.body?JSON.stringify(opts.body):undefined});
  return await r.json().catch(()=>({}));
}

/* ============ HELPERS ============ */
function toast(m,t='s'){const e=document.createElement('div');e.className='tst tst-'+t;e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;')}
function fmtT(iso){if(!iso)return'-';const d=new Date(iso);return(d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function fmtTF(iso){if(!iso)return'-';const d=new Date(iso);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')}
function sb(s){const m={completed:'bdg-g',pending:'bdg-b',failed:'bdg-r',processing:'bdg-b',success:'bdg-g'};const n={completed:'成功',pending:'处理中',failed:'失败',processing:'处理中',success:'成功'};return'<span class="bdg '+(m[s]||'bdg-y')+'">'+(n[s]||s||'未知')+'</span>'}
function pi(p){if(!p.images)return[];try{return JSON.parse(p.images)}catch(e){return[]}}
function ic(p){return 1+pi(p).filter(i=>i).length}
function parseYouzanLink(url){if(!url)return null;const m=url.match(/\/goods2\/([A-Za-z0-9]+)/);if(m)return{alias:m[1],path:'pages/goods/detail/index?alias='+m[1]};return null}
async function confirm2(msg){return new Promise(r=>{const ov=document.createElement('div');ov.className='mo';ov.innerHTML='<div class="mb" style="max-width:400px"><p class="mb-4">'+msg+'</p><div class="flex justify-end gap-3"><button class="bs" id="_cn">取消</button><button class="bd" id="_cf">确认</button></div></div>';document.body.appendChild(ov);ov.querySelector('#_cn').onclick=()=>{ov.remove();r(false)};ov.querySelector('#_cf').onclick=()=>{ov.remove();r(true)}})}
function prompt2(msg,def){return new Promise(r=>{const ov=document.createElement('div');ov.className='mo';ov.innerHTML='<div class="mb" style="max-width:400px"><p class="mb-4">'+msg+'</p><input class="fi mb-4" id="_pi" value="'+esc(def||'')+'"><div class="flex justify-end gap-3"><button class="bs" id="_cn">取消</button><button class="bp" id="_cf">确定</button></div></div>';document.body.appendChild(ov);ov.querySelector('#_cn').onclick=()=>{ov.remove();r(null)};ov.querySelector('#_cf').onclick=()=>{const v=ov.querySelector('#_pi').value;ov.remove();r(v)}})}

/* ============ ROUTER ============ */
function nav(p){pg=p;window.location.hash=p;render()}
function render(){const a=document.getElementById('app');if(!localStorage.getItem('at')){a.innerHTML=rLogin();bLogin();return}a.innerHTML=rLayout();bNav();loadPg()}
window.logout=function(){localStorage.removeItem('at');render()};

/* ============ LOGIN ============ */
function rLogin(){return'<div class="min-h-screen flex items-center justify-center bg-gray-100"><div class="cd p-8 w-full max-w-sm"><h1 class="text-xl font-bold mb-1 text-center">RSNY</h1><p class="text-sm text-gray-500 text-center mb-6">管理后台登录</p><div class="mb-4"><label class="fl">管理员密码</label><input type="password" id="pwd" class="fi" placeholder="请输入密码"></div><button id="lBtn" class="bp w-full">登录</button></div></div>'}
function bLogin(){document.getElementById('lBtn').onclick=function(){if(document.getElementById('pwd').value===AK){localStorage.setItem('at',AK);render()}else toast('密码错误','e')}}

/* ============ LAYOUT ============ */
function rLayout(){
  const m=[{id:'dashboard',l:'概览',i:'📊'},{id:'products',l:'商品管理',i:'📦'},{id:'users',l:'用户管理',i:'👤'},{id:'config',l:'API 配置',i:'⚙️'},{id:'records',l:'试戴记录',i:'📋'},{id:'apiLogs',l:'API 日志',i:'📝'},{id:'homepage',l:'首页装修',i:'🎨'},{id:'pageConfig',l:'页面配置',i:'📄'},{id:'dataIO',l:'数据导入导出',i:'💾'}];
  return'<div class="flex min-h-screen"><aside class="w-56 bg-gray-900 text-white flex flex-col flex-shrink-0"><div class="p-4 border-b border-gray-800"><h1 class="text-lg font-bold">RSNY 后台</h1></div><nav class="flex-1 py-2 overflow-y-auto">'+m.map(function(x){return'<a href="#'+x.id+'" class="si flex items-center gap-3 px-4 py-3 cursor-pointer '+(pg===x.id?'ac':'')+'" data-p="'+x.id+'"><span>'+x.i+'</span><span class="text-sm">'+x.l+'</span></a>'}).join('')+'</nav><div class="p-4 border-t border-gray-800"><button onclick="logout()" class="text-sm text-gray-400 hover:text-white">退出登录</button></div></aside><main class="flex-1 p-6 overflow-auto" id="mc"></main></div>';
}
function bNav(){document.querySelectorAll('[data-p]').forEach(function(e){e.onclick=function(ev){ev.preventDefault();nav(e.dataset.p)}})}

/* ============ LOAD PAGE ============ */
async function loadPg(){
  const mc=document.getElementById('mc');if(!mc)return;
  mc.innerHTML='<div class="flex items-center justify-center h-64"><span class="ld"></span></div>';
  try{switch(pg){
    case'dashboard':await lDash();mc.innerHTML=rDash();break;
    case'products':await lProd();mc.innerHTML=rProd();bProd();break;
    case'users':await lUser();mc.innerHTML=rUser();bUser();break;
    case'config':await lConf();mc.innerHTML=rConf();bConf();break;
    case'records':await lRec();mc.innerHTML=rRec();bRec();break;
    case'apiLogs':await lALog();mc.innerHTML=rALog();bALog();break;
    case'homepage':await lHP();mc.innerHTML=rHP();bHP();break;
    case'pageConfig':await lPCfg();mc.innerHTML=rPCfg();bPCfg();break;
    case'dataIO':mc.innerHTML=rDIO();bDIO();break;
    default:await lDash();mc.innerHTML=rDash();
  }}catch(e){console.error(e);mc.innerHTML='<div class="text-red-500 p-4">加载失败: '+esc(e.message)+'</div>'}
}

/* ============ DASHBOARD ============ */
async function lDash(){
  const td=new Date().toISOString().split('T')[0],ts=td+'T00:00:00';
  const[pR,rR,tR]=await Promise.all([sq('products',{s:'id',l:9999}),sq('tryon_records',{s:'user_id',l:9999}),sq('tryon_records',{s:'user_id',ge:{created_at:ts}})]);
  const uids=new Set(),tuids=new Set();
  for(const x of(rR.data||[]))if(x.user_id)uids.add(x.user_id);
  for(const x of(tR.data||[]))if(x.user_id)tuids.add(x.user_id);
  ST={tp:pR.count||0,tu:uids.size,tr:rR.count||0,tc:tR.count||0,ta:tuids.size};
  const recR=await sq('tryon_records',{s:'*',od:'created_at.desc',l:10});ST.rr=recR.data||[];
  const prR=await sq('products',{s:'id,name,image_url,category,price,is_active',od:'created_at.desc',l:5});ST.rp=prR.data||[];
}
function rDash(){
  let h='<div><h2 class="text-xl font-bold mb-6">数据概览</h2>';
  h+='<div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8">';
  h+=sC('今日生成',ST.tc||0,'text-blue-600')+sC('累计用户',ST.tu||0,'text-green-600')+sC('商品总数',ST.tp||0,'text-gray-900')+sC('累计记录',ST.tr||0,'text-purple-600')+sC('今日活跃',ST.ta||0,'text-orange-600');
  h+='</div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6">';
  // Latest products
  h+='<div class="cd p-6"><h3 class="font-semibold mb-4">最新商品</h3>';
  if(ST.rp&&ST.rp.length){for(const p of ST.rp){
    h+='<div class="flex items-center gap-3 py-3 border-b border-gray-50 last:border-0">';
    h+='<img src="'+(p.image_url||'https://via.placeholder.com/48')+'" class="w-12 h-12 rounded-lg object-cover" onerror="this.src=\'https://via.placeholder.com/48\'">';
    h+='<div class="flex-1"><div class="text-sm font-medium">'+esc(p.name)+'</div><div class="text-xs text-gray-400">'+(CN[p.category]||p.category||'-')+' · ¥'+(p.price||0)+'</div></div>';
    h+='<span class="bdg '+(p.is_active?'bdg-g':'bdg-y')+'">'+(p.is_active?'上架':'下架')+'</span></div>';
  }}else h+='<div class="text-gray-400 text-center py-4">暂无商品</div>';
  h+='</div>';
  // Recent records
  h+='<div class="cd p-6"><h3 class="font-semibold mb-4">最近试戴</h3><table class="w-full text-sm"><thead><tr class="text-left text-gray-500 border-b"><th class="pb-3">用户</th><th class="pb-3">状态</th><th class="pb-3">时间</th></tr></thead><tbody>';
  if(ST.rr&&ST.rr.length){for(const r of ST.rr){
    h+='<tr class="border-b border-gray-50"><td class="py-2 font-mono text-xs text-gray-500">'+(r.user_id||'').slice(0,16)+'...</td><td class="py-2">'+sb(r.status)+'</td><td class="py-2 text-gray-500">'+fmtT(r.created_at)+'</td></tr>';
  }}else h+='<tr><td colspan="3" class="py-4 text-gray-400 text-center">暂无</td></tr>';
  h+='</tbody></table></div></div></div>';
  return h;
}
function sC(l,v,c){return'<div class="cd p-5"><p class="text-sm text-gray-500 mb-1">'+l+'</p><p class="text-2xl font-bold '+c+'">'+v+'</p></div>'}

/* ============ PRODUCTS PAGE ============ */
async function lProd(){
  const off=(P.p-1)*P.ps;const pa={s:'*',od:'sort_order.asc,created_at.desc',l:P.ps,o:off,lk:{}};
  if(pS)pa.lk.name=pS;const w={};if(pC)w.category=pC;if(pSt!=='')w.is_active=pSt==='true';if(Object.keys(w).length)pa.w=w;
  const r=await sq('products',pa);P.l=r.data||[];P.t=r.count||0;selP=new Set();
}
function rProd(){
  const tp=Math.ceil(P.t/P.ps)||1;
  let h='<div><div class="flex justify-between items-center mb-6 flex-wrap gap-2"><h2 class="text-xl font-bold">商品管理 ('+P.t+')</h2>';
  h+='<div class="flex gap-2 flex-wrap"><button onclick="dlTemplate()" class="bs">📥 下载导入模板</button><button onclick="showImpM()" class="bs">📤 批量导入 Excel</button><button onclick="openPM(null)" class="bp">+ 新增商品</button></div></div>';
  // Filter bar
  h+='<div class="cd p-4 mb-4 flex flex-wrap gap-3 items-center">';
  h+='<input type="text" id="pSe" class="si2" placeholder="搜索商品名称..." value="'+esc(pS)+'">';
  h+='<select id="pCa" class="sl2"><option value="">全部分类</option>';
  for(const c of CO)h+='<option value="'+c.value+'" '+(pC===c.value?'selected':'')+'>'+c.label+'</option>';
  h+='</select><select id="pSt2" class="sl2"><option value="">全部状态</option><option value="true" '+(pSt==='true'?'selected':'')+'>上架</option><option value="false" '+(pSt==='false'?'selected':'')+'>下架</option></select>';
  h+='<button onclick="applyPF()" class="bp">筛选</button><button onclick="clearPF()" class="bs">重置</button>';
  if(selP.size>0)h+='<span class="text-sm text-gray-500 ml-auto">已选'+selP.size+'项</span><button onclick="bUpdS(true)" class="bg2">批量上架</button><button onclick="bUpdS(false)" class="bw">批量下架</button><button onclick="bDelP()" class="bd">批量删除</button>';
  h+='</div>';
  // Table
  h+='<div class="cd overflow-hidden"><table class="w-full text-sm"><thead><tr class="text-left text-gray-500 border-b bg-gray-50"><th class="p-4 w-10"><input type="checkbox" id="saP"></th><th class="p-4">商品信息</th><th class="p-4">分类</th><th class="p-4">价格</th><th class="p-4">状态</th><th class="p-4">图片</th><th class="p-4">有赞</th><th class="p-4 text-right">操作</th></tr></thead><tbody>';
  if(P.l.length){for(const p of P.l){
    h+='<tr class="border-b border-gray-50 table-row '+(selP.has(p.id)?'bg-blue-50':'')+'">';
    h+='<td class="p-4"><input type="checkbox" class="pc" data-id="'+p.id+'" '+(selP.has(p.id)?'checked':'')+'></td>';
    h+='<td class="p-4"><div class="flex items-center gap-3"><img src="'+(p.image_url||'https://via.placeholder.com/48')+'" class="w-12 h-12 rounded-lg object-cover" onerror="this.src=\'https://via.placeholder.com/48\'"><div><div class="font-medium">'+esc(p.name)+'</div>'+(p.product_code?'<div class="text-xs text-gray-400">'+esc(p.product_code)+'</div>':'')+'</div></div></td>';
    h+='<td class="p-4">'+(CN[p.category]||p.category||'-')+'</td>';
    h+='<td class="p-4">¥'+(p.price||0)+'</td>';
    h+='<td class="p-4">'+(p.is_active?'<span class="bdg bdg-g">上架</span>':'<span class="bdg bdg-y">下架</span>')+'</td>';
    h+='<td class="p-4">'+ic(p)+'张</td>';
    h+='<td class="p-4">'+(p.youzan_url?'<span class="bdg bdg-b">已绑定</span>':p.youzan_id?'<span class="bdg bdg-w">有ID</span>':'-')+'</td>';
    h+='<td class="p-4 text-right"><button onclick="openPM('+esc(JSON.stringify(p))+')" class="text-blue-500 hover:underline mr-3">编辑</button><button onclick="delP(\''+p.id+'\')" class="text-red-500 hover:underline">删除</button></td>';
    h+='</tr>';
  }}else h+='<tr><td colspan="8" class="p-8 text-center text-gray-400">暂无商品</td></tr>';
  h+='</tbody></table>';
  h+='<div class="p-4 border-t flex justify-between items-center"><span class="text-sm text-gray-500">共'+P.t+'条，第'+P.p+'/'+tp+'页</span><div class="flex gap-2"><button onclick="chPP('+(P.p-1)+')" '+(P.p<=1?'disabled':'')+' class="bs">上一页</button><button onclick="chPP('+(P.p+1)+')" '+(P.p>=tp?'disabled':'')+' class="bs">下一页</button></div></div></div></div>';
  h+=rImpM();
  return h;
}
function bProd(){
  // Select all checkbox
  const sa=document.getElementById('saP');if(sa)sa.onclick=function(){const ck=this.checked;document.querySelectorAll('.pc').forEach(function(c){c.checked=ck;if(ck)selP.add(c.dataset.id);else selP.delete(c.dataset.id)});loadPg()};
  // Individual checkboxes
  document.querySelectorAll('.pc').forEach(function(c){c.onclick=function(){if(this.checked)selP.add(this.dataset.id);else selP.delete(this.dataset.id);render()}});

window.doImport=async function(){
  const fileInput=document.getElementById('impFile');if(!fileInput||!fileInput.files.length){toast('请选择文件','e');return}
  const mode=document.getElementById('dupMode')?.value||'skip';
  try{
    const data=await fileInput.files[0].arrayBuffer();const wb=XLSX.read(data);const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:''});if(!rows.length){toast('文件为空','e');return}
    // Column name mapping (Chinese header -> field name)
    const colMap={'商品编码(product_code)':'product_code','商品编码':'product_code','product_code':'product_code','名称(name)':'name','名称':'name','name':'name','规格名称(spec_name)':'spec_name','规格名称':'spec_name','spec_name':'spec_name','分类(category)':'category','分类':'category','category':'category','价格(price)':'price','价格':'price','price':'price','有赞链接(youzan_url)':'youzan_url','有赞链接':'youzan_url','youzan_url':'youzan_url','有赞ID(youzan_id)':'youzan_id','有赞ID':'youzan_id','youzan_id':'youzan_id','跳转AppID(jump_app_id)':'jump_app_id','跳转AppID':'jump_app_id','jump_app_id':'jump_app_id','有赞商品ID(youzan_product_id)':'youzan_product_id','youzan_product_id':'youzan_product_id','主图URL(image_url)':'image_url','主图URL':'image_url','image_url':'image_url','附图URL(images,逗号分隔)':'images','附图URL(images)':'images','images':'images','隐藏图URL(hidden_image_url)':'hidden_image_url','隐藏图URL':'hidden_image_url','hidden_image_url':'hidden_image_url','描述(description)':'description','描述':'description','description':'description','排序(sort_order)':'sort_order','排序':'sort_order','sort_order':'sort_order'};
    // Fetch existing products for dedup
    let existing=[];if(mode!=='duplicate'){const er=await sq('products',{s:'id,product_code',l:9999});existing=er.data||[]}
    const existingCodes=new Set();for(const e of existing)if(e.product_code)existingCodes.add(e.product_code);
    let imported=0,skipped=0,replaced=0,errors=0;
    const preview=document.getElementById('impPreview');
    for(const row of rows){
      // Map row keys to field names
      const item={};for(const[k,v]of Object.entries(row)){const fk=colMap[k];if(fk)item[fk]=v}
      if(!item.name){errors++;continue}
      // Handle category Chinese -> English
      if(item.category&&CM[item.category])item.category=CM[item.category];
      // Handle images: comma-separated string -> JSON array
      if(item.images&&typeof item.images==='string'){const urls=item.images.split(',').map(u=>u.trim()).filter(u=>u);item.images=JSON.stringify(urls)}
      // Handle price
      if(item.price)item.price=parseFloat(item.price)||0;
      if(item.sort_order)item.sort_order=parseInt(item.sort_order)||0;
      item.is_active=true;
      // Dedup logic
      if(item.product_code&&existingCodes.has(item.product_code)){
        if(mode==='skip'){skipped++;continue}
        if(mode==='replace'){
          // Find existing and update
          const ex=existing.find(e=>e.product_code===item.product_code);
          if(ex){const r=await sm('products','PATCH',item,{c:'id',v:ex.id});if(r.error)errors++;else replaced++}
          continue;
        }
        // mode==='duplicate' -> just insert
      }
      const r=await sm('products','POST',item);if(r.error)errors++;else{imported++;if(item.product_code)existingCodes.add(item.product_code)}
      if(preview)preview.innerHTML='<div class="text-sm text-gray-500">导入中... 已处理: '+(imported+skipped+replaced+errors)+'/'+rows.length+'</div>';
    }
    if(preview)preview.innerHTML='<div class="text-sm"><p class="text-green-600">✅ 新增: '+imported+'</p>'+(replaced?'<p class="text-blue-600">🔄 替换: '+replaced+'</p>':'')+(skipped?'<p class="text-yellow-600">⏭️ 跳过: '+skipped+'</p>':'')+(errors?'<p class="text-red-600">❌ 错误: '+errors+'</p>':'')+'</div>';
    toast('导入完成');await lProd();document.getElementById('mc').innerHTML=rProd();bProd();
  }catch(e){console.error(e);toast('导入失败: '+e.message,'e')}
};

// Export single table
window.exportTable=async function(table){
  toast('正在导出 '+table+'...','i');
  const r=await sq(table,{s:'*',l:9999});if(r.error){toast('导出失败','e');return}
  const blob=new Blob([JSON.stringify(r.data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=table+'_'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(url);
  toast('已导出 '+(r.data?.length||0)+' 条');
};
// Export all
window.exportAll=async function(){
  toast('正在导出全部数据...','i');
  const tables=['products','api_config','tryon_records','tryon_photos','users'];
  const data={exportTime:new Date().toISOString()};
  for(const t of tables){const r=await sq(t,{s:'*',l:9999});data[t]=r.data||[]}
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='RSNY_全部数据_'+new Date().toISOString().split('T')[0]+'.json';a.click();URL.revokeObjectURL(url);
  toast('全部数据已导出');
};
// Import JSON
window.importJSON=async function(){
  const fi=document.getElementById('dioFile');if(!fi||!fi.files.length){toast('请选择文件','e');return}
  const mode=document.getElementById('dioMode')?.value||'skip';
  try{
    const text=await fi.files[0].text();const data=JSON.parse(text);
    const tables=['products','api_config','tryon_records','tryon_photos'];
    let totalImported=0,totalSkipped=0,totalErrors=0;
    const resultEl=document.getElementById('dioResult');
    for(const t of tables){
      if(!data[t]||!data[t].length)continue;
      // Get existing for dedup
      let existing=new Set();if(mode!=='duplicate'&&t==='products'){const er=await sq('products',{s:'id,product_code',l:9999});for(const e of(er.data||[]))if(e.product_code)existing.add(e.product_code)}
      for(const item of data[t]){
        // Clean: remove id to let DB generate new one
        const clean={...item};delete clean.id;delete clean.created_at;delete clean.updated_at;
        // Dedup for products by product_code
        if(t==='products'&&clean.product_code&&existing.has(clean.product_code)){
          if(mode==='skip'){totalSkipped++;continue}
          if(mode==='replace'){await sm('products','DELETE',{},{c:'product_code',v:clean.product_code})}
        }
        const r=await sm(t,'POST',clean);if(r.error)totalErrors++;else totalImported++;
      }
      if(resultEl)resultEl.innerHTML='<div class="text-sm text-gray-500">处理 '+t+' 中...</div>';
    }
    if(resultEl)resultEl.innerHTML='<div class="text-sm"><p class="text-green-600">✅ 新增: '+totalImported+'</p>'+(totalSkipped?'<p class="text-yellow-600">⏭️ 跳过: '+totalSkipped+'</p>':'')+(totalErrors?'<p class="text-red-600">❌ 错误: '+totalErrors+'</p>':'')+'</div>';
    toast('导入完成');
  }catch(e){toast('导入失败: '+e.message,'e')}
};
// Batch parse youzan links
window.batchParseYouzan=async function(){
  toast('正在扫描有赞链接...','i');
  const r=await sq('products',{s:'id,name,youzan_url,jump_url',l:9999});const prods=r.data||[];
  let parsed=0,failed=0;
  const resultEl=document.getElementById('yzBatchResult');
  let h='<div class="text-sm space-y-2">';
  for(const p of prods){
    if(!p.youzan_url)continue;
    const res=parseYouzanLink(p.youzan_url);
    if(res){
      const newJump='weixin://dl/business/?appid=wxceee2295851cb729&path='+encodeURIComponent(res.path);
      if(p.jump_url!==newJump){await sm('products','PATCH',{jump_url:newJump},{c:'id',v:p.id});h+='<p class="text-green-600">✅ '+esc(p.name)+': '+res.path+'</p>';parsed++}
      else h+='<p class="text-gray-400">⏭️ '+esc(p.name)+': 已存在</p>';
    }else{h+='<p class="text-red-500">❌ '+esc(p.name)+': 无法解析</p>';failed++}
  }
  h+='</div>';
  if(resultEl)resultEl.innerHTML=h;
  toast('解析完成: '+parsed+' 成功, '+failed+' 失败');
};

/* ============ HASH ROUTING + INIT ============ */
window.onhashchange=function(){const h=window.location.hash.slice(1);if(h&&h!==pg){pg=h;render()}};
render();

</script>
