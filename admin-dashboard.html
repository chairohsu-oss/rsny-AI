<body>
  <div id="app"></div>

<script>
// ===================== Config =====================
const SUPABASE_URL = 'https://iwczepxmfjfqpdyiilrq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml3Y3plcHhtZmpmcXBkeWlpbHJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MzcyMTQsImV4cCI6MjA5MTExMzIxNH0.m-_299ReoSkyVeptH2v9fb2IjCRwPnLUWoJATrmrKeU';
const API_BASE = 'https://tryon-api-qluouziury.cn-hangzhou.fcapp.run';
const ADMIN_KEY = 'rsny@1234';

const categoryNames = {
  necklace: '项链', ring: '戒指', earring: '耳饰',
  bracelet: '手链', bangle: '手镯', sunglasses: '墨镜',
  bag: '包包', hat: '帽子', hair_accessory: '发饰'
};
const categoryOptions = Object.entries(categoryNames).map(([v,l])=>({value:v,label:l}));

// ===================== API Utils =====================
async function supabaseQuery(table, params = {}) {
  let url = `${SUPABASE_URL}/rest/v1/${table}`;
  const qs = [];
  if (params.select) qs.push(`select=${encodeURIComponent(params.select)}`);
  if (params.limit) qs.push(`limit=${params.limit}`);
  if (params.offset) qs.push(`offset=${params.offset}`);
  if (params.order) qs.push(`order=${encodeURIComponent(params.order)}`);
  if (params.where) {
    for (const [k, v] of Object.entries(params.where)) {
      if (v !== undefined && v !== null && v !== '') qs.push(`${k}=eq.${encodeURIComponent(v)}`);
    }
  }
  if (params.like) {
    for (const [k, v] of Object.entries(params.like)) {
      if (v) qs.push(`${k}=ilike.*${encodeURIComponent(v)}*`);
    }
  }
  if (params.gte) {
    for (const [k, v] of Object.entries(params.gte)) {
      if (v) qs.push(`${k}=gte.${encodeURIComponent(v)}`);
    }
  }
  if (qs.length) url += '?' + qs.join('&');
  const res = await fetch(url, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Accept': 'application/json', 'Prefer': 'count=exact' }
  });
  const data = await res.json();
  const count = res.headers.get('content-range')?.match(/\/(\d+)/)?.[1];
  if (data && data.error) return { error: data.error, data: [], count: 0 };
  return { data: Array.isArray(data) ? data : [], count: parseInt(count || '0') };
}

async function supabaseMutate(table, method, data, where) {
  const headers = {
    'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json', 'Prefer': 'return=representation'
  };
  let url = `${SUPABASE_URL}/rest/v1/${table}`;
  if (where) url += `?${where.column}=eq.${encodeURIComponent(where.value)}`;
  const res = await fetch(url, { method, headers, body: JSON.stringify(data) });
  const result = await res.json().catch(() => ({}));
  if (result && result.error) return { error: result.error };
  return { data: result };
}

async function fcApi(path, opts = {}) {
  const res = await fetch(API_BASE + path, {
    method: opts.method || 'GET',
    headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY, ...(opts.headers||{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  return await res.json().catch(() => ({}));
}

// ===================== Toast =====================
function showToast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ===================== State =====================
let currentPage = 'dashboard';
let products = { list: [], total: 0, page: 1, pageSize: 30 };
let users = { list: [], total: 0, page: 1, pageSize: 30 };
let records = { list: [], total: 0, page: 1, pageSize: 50 };
let apiLogs = { list: [], total: 0, page: 1, pageSize: 50 };
let configs = [];
let stats = {};
let homepageConfig = null;

// ===================== Router =====================
function navigate(page) {
  currentPage = page;
  window.location.hash = page;
  render();
}

function render() {
  const app = document.getElementById('app');
  const token = localStorage.getItem('adminToken');
  if (!token) { app.innerHTML = renderLogin(); bindLogin(); return; }
  app.innerHTML = renderLayout();
  bindNav();
  loadPageData();
}

// ===================== Login =====================
function renderLogin() {
  return `
    <div class="min-h-screen flex items-center justify-center bg-gray-100">
      <div class="card p-8 w-full max-w-sm">
        <h1 class="text-xl font-bold mb-1 text-center">RSNY</h1>
        <p class="text-sm text-gray-500 text-center mb-6">管理后台登录</p>
        <div class="mb-4">
          <label class="form-label">管理员密码</label>
          <input type="password" id="pwd" class="form-input" placeholder="请输入密码" value="rsny@1234">
        </div>
        <button id="loginBtn" class="btn-primary w-full">登录</button>
      </div>
    </div>`;
}
function bindLogin() {
  document.getElementById('loginBtn').onclick = () => {
    if (document.getElementById('pwd').value === ADMIN_KEY) {
      localStorage.setItem('adminToken', ADMIN_KEY);
      render();
    } else {
      showToast('密码错误', 'error');
    }
  };
}

// ===================== Layout =====================
function renderLayout() {
  const menu = [
    { id: 'dashboard', label: '概览', icon: '📊' },
    { id: 'products', label: '商品管理', icon: '📦' },
    { id: 'users', label: '用户管理', icon: '👤' },
    { id: 'config', label: 'API 配置', icon: '⚙️' },
    { id: 'records', label: '试戴记录', icon: '📋' },
    { id: 'apiLogs', label: 'API 日志', icon: '📝' },
  ];
  return `
    <div class="flex min-h-screen">
      <aside class="w-56 bg-gray-900 text-white flex flex-col flex-shrink-0">
        <div class="p-4 border-b border-gray-800">
          <h1 class="text-lg font-bold">RSNY 后台</h1>
        </div>
        <nav class="flex-1 py-2">
          ${menu.map(m => `
            <a href="#${m.id}" class="sidebar-item flex items-center gap-3 px-4 py-3 cursor-pointer ${currentPage === m.id ? 'active' : ''}" data-page="${m.id}">
              <span>${m.icon}</span>
              <span class="text-sm">${m.label}</span>
            </a>
          `).join('')}
        </nav>
        <div class="p-4 border-t border-gray-800">
          <button onclick="logout()" class="text-sm text-gray-400 hover:text-white">退出登录</button>
        </div>
      </aside>
      <main class="flex-1 p-6 overflow-auto" id="mainContent"></main>
    </div>`;
}
function bindNav() {
  document.querySelectorAll('[data-page]').forEach(el => {
    el.onclick = (e) => { e.preventDefault(); navigate(el.dataset.page); };
  });
}
window.logout = function() { localStorage.removeItem('adminToken'); render(); };

// ===================== Load Page Data =====================
async function loadPageData() {
  const main = document.getElementById('mainContent');
  if (!main) return;
  main.innerHTML = '<div class="flex items-center justify-center h-64"><span class="loading"></span></div>';
  try {
    switch(currentPage) {
      case 'dashboard': await loadDashboard(); main.innerHTML = renderDashboard(); break;
      case 'products': await loadProducts(); main.innerHTML = renderProducts(); bindProducts(); break;
      case 'users': await loadUsers(); main.innerHTML = renderUsers(); bindUsers(); break;
      case 'config': await loadConfig(); main.innerHTML = renderConfig(); bindConfig(); break;
      case 'records': await loadRecords(); main.innerHTML = renderRecords(); bindRecords(); break;
      case 'apiLogs': await loadApiLogs(); main.innerHTML = renderApiLogs(); bindApiLogs(); break;
      default: main.innerHTML = renderDashboard();
    }
  } catch(e) {
    console.error(e);
    main.innerHTML = `<div class="text-red-500 p-4">加载失败: ${e.message}</div>`;
  }
}

// ===================== Dashboard =====================
async function loadDashboard() {
  const today = new Date().toISOString().split('T')[0];
  const todayStart = `${today}T00:00:00`;
  
  const [pRes, uRes, rRes, todayRes] = await Promise.all([
    supabaseQuery('products', { select: 'id', limit: 9999 }),
    supabaseQuery('tryon_records', { select: 'user_id', limit: 9999 }),
    supabaseQuery('tryon_records', { select: 'id', limit: 9999 }),
    supabaseQuery('tryon_records', { select: 'user_id', gte: { created_at: todayStart } }),
  ]);
  
  const allUsers = uRes.data || [];
  const uniqueUsers = [...new Set(allUsers.map(u => u.user_id).filter(Boolean))];
  const todayUsers = [...new Set((todayRes.data || []).map(u => u.user_id).filter(Boolean))];
  
  stats = {
    totalProducts: pRes.count || 0,
    totalUsers: uniqueUsers.length,
    totalRecords: rRes.count || 0,
    todayCount: todayRes.count || 0,
    todayUsers: todayUsers.length,
  };
  
  // 最近记录
  const recentRes = await supabaseQuery('tryon_records', { select: '*,products(name)', order: 'created_at.desc', limit: 10 });
  stats.recentRecords = recentRes.data || [];
}

function renderDashboard() {
  return `
    <div>
      <h2 class="text-xl font-bold mb-6">数据概览</h2>
      <div class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-4 mb-8">
        ${statCard('今日生成', stats.todayCount || 0, 'text-blue-600')}
        ${statCard('累计用户', stats.totalUsers || 0, 'text-green-600')}
        ${statCard('商品总数', stats.totalProducts || 0, 'text-gray-900')}
        ${statCard('累计记录', stats.totalRecords || 0, 'text-purple-600')}
        ${statCard('今日活跃', stats.todayUsers || 0, 'text-orange-600')}
        ${statCard('剩余额度', '10次/人', 'text-gray-900')}
      </div>
      
      <div class="card p-6">
        <h3 class="font-semibold mb-4">最近试戴记录</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="text-left text-gray-500 border-b">
              <th class="pb-3">用户ID</th><th class="pb-3">商品</th><th class="pb-3">状态</th><th class="pb-3">时间</th>
            </tr></thead>
            <tbody>
              ${(stats.recentRecords || []).map(r => `
                <tr class="border-b border-gray-50">
                  <td class="py-3 font-mono text-xs text-gray-500">${(r.user_id || '').slice(0,16)}...</td>
                  <td class="py-3">${r.products?.name || r.product_id?.slice(0,8) || '-'}</td>
                  <td class="py-3">${renderStatusBadge(r.status)}</td>
                  <td class="py-3 text-gray-500">${formatTime(r.created_at)}</td>
                </tr>
              `).join('') || '<tr><td colspan="4" class="py-4 text-gray-400 text-center">暂无记录</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}
function statCard(label, value, color) {
  return `<div class="card p-5">
    <p class="text-sm text-gray-500 mb-1">${label}</p>
    <p class="text-2xl font-bold ${color}">${value}</p>
  </div>`;
}

// ===================== Products =====================
let productSearch = '', productCategory = '', productStatus = '';
let selectedProductIds = new Set();
let showProductModal = false;
let editingProduct = null;

async function loadProducts() {
  const offset = (products.page - 1) * products.pageSize;
  const params = { select: '*', order: 'sort_order.asc,created_at.desc', limit: products.pageSize, offset, like: {} };
  if (productSearch) params.like.name = productSearch;
  if (productCategory) params.where = { category: productCategory };
  if (productStatus !== '') params.where = { ...(params.where||{}), is_active: productStatus === 'true' };
  
  const res = await supabaseQuery('products', params);
  products.list = res.data || [];
  products.total = res.count || 0;
  selectedProductIds = new Set();
}

    <div>
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">商品管理 (${products.total})</h2>
        <div class="flex gap-2">
          <button onclick="downloadImportTemplate()" class="btn-secondary">📥 下载导入模板</button>
          <button onclick="showImportModal()" class="btn-secondary">📤 批量导入 Excel</button>
          <button onclick="openProductModal()" class="btn-primary">+ 新增商品</button>
        </div>
      </div>
      
      <!-- 筛选栏 -->
      <div class="card p-4 mb-4 flex flex-wrap gap-3 items-center">
        <input type="text" id="prodSearch" class="search-input" placeholder="搜索商品名称..." value="${productSearch}">
        <select id="prodCategory" class="select-input">
          <option value="">全部分类</option>
          ${categoryOptions.map(c => `<option value="${c.value}" ${productCategory===c.value?'selected':''}>${c.label}</option>`).join('')}
        </select>
        <select id="prodStatus" class="select-input">
          <option value="">全部状态</option>
          <option value="true" ${productStatus==='true'?'selected':''}>上架</option>
          <option value="false" ${productStatus==='false'?'selected':''}>下架</option>
        </select>
        <button onclick="applyProductFilter()" class="btn-primary">筛选</button>
        <button onclick="clearProductFilter()" class="btn-secondary">重置</button>
        ${selectedProductIds.size > 0 ? `
          <span class="text-sm text-gray-500 ml-auto">已选 ${selectedProductIds.size} 项</span>
          <button onclick="batchUpdateStatus(true)" class="btn-success">批量上架</button>
          <button onclick="batchUpdateStatus(false)" class="btn-secondary">批量下架</button>
          <button onclick="batchDeleteProducts()" class="btn-danger">批量删除</button>
          <button onclick="batchParseYouzan()" class="btn-secondary">解析有赞</button>
        ` : ''}
      </div>
      
      <!-- 表格 -->
      <div class="card overflow-hidden">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-gray-500 border-b bg-gray-50">
            <th class="p-4 w-10"><input type="checkbox" id="selectAllProd" ${selectedProductIds.size === products.list.length && products.list.length > 0 ? 'checked' : ''}></th>
            <th class="p-4">图片</th><th class="p-4">名称</th><th class="p-4">分类</th><th class="p-4">价格</th>
            <th class="p-4">状态</th><th class="p-4">排序</th><th class="p-4 text-right">操作</th>
          </tr></thead>
          <tbody>
            ${products.list.map(p => `
              <tr class="border-b border-gray-50 table-row">
                <td class="p-4"><input type="checkbox" class="prod-checkbox" data-id="${p.id}" ${selectedProductIds.has(p.id)?'checked':''}></td>
                <td class="p-4"><img src="${p.image_url || 'https://via.placeholder.com/48'}" class="w-12 h-12 object-cover rounded-lg" onerror="this.src='https://via.placeholder.com/48'"></td>
                <td class="p-4"><div class="font-medium">${p.name}</div>${p.youzan_url ? '<div class="text-xs text-blue-500 mt-1">🔗 有赞</div>' : ''}</td>
                <td class="p-4">${categoryNames[p.category] || p.category}</td>
                <td class="p-4">¥${p.price}</td>
                <td class="p-4">${p.is_active ? '<span class="badge badge-green">上架</span>' : '<span class="badge badge-gray">下架</span>'}</td>
                <td class="p-4">${p.sort_order}</td>
                <td class="p-4 text-right">
                  <button onclick='openProductModal(${JSON.stringify(p).replace(/'/g,"&#39;")})' class="text-blue-500 hover:underline mr-3">编辑</button>
                  <button onclick='deleteProduct("${p.id}")' class="text-red-500 hover:underline">删除</button>
                </td>
              </tr>
            `).join('') || '<tr><td colspan="8" class="p-8 text-center text-gray-400">暂无商品</td></tr>'}
          </tbody>
        </table>
        
        <!-- 分页 -->
        <div class="p-4 border-t flex justify-between items-center">
          <span class="text-sm text-gray-500">共 ${products.total} 条，第 ${products.page}/${totalPages} 页</span>
          <div class="flex gap-2">
            <button onclick="changeProductPage(${products.page-1})" ${products.page<=1?'disabled':''} class="btn-secondary">上一页</button>
            <button onclick="changeProductPage(${products.page+1})" ${products.page>=totalPages?'disabled':''} class="btn-secondary">下一页</button>
          </div>
        </div>
      </div>
    </div>
    ${showProductModal ? renderProductModal() : ''}
    ${renderImportModal()}`;
}

      <div class="modal">

          <h3 class="text-lg font-bold">${editingProduct ? '编辑商品' : '新增商品'}</h3>

        <div class="space-y-4">

          <div class="flex gap-4">

window.confirmImport = async function() {
  const file = document.getElementById('importFile').files[0];
  if (!file) { showToast('请选择文件', 'error'); return; }
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet);
      if (!rows.length) { showToast('文件为空', 'error'); return; }
      
      let success = 0, fail = 0;
      for (const row of rows) {
        const item = {
          name: row.name || '', category: row.category || 'necklace',
          price: parseFloat(row.price) || 0, image_url: row.image_url || '',
          description: row.description || '', jump_url: row.jump_url || '',
          is_active: row.is_active === 'true' || row.is_active === true,
          sort_order: parseInt(row.sort_order) || 0,
          created_at: new Date().toISOString(), updated_at: new Date().toISOString()
        };
        if (!item.name) { fail++; continue; }
        const r = await supabaseMutate('products', 'POST', item);
        if (r.error) fail++; else success++;
      }
      showToast(`导入完成：${success} 成功，${fail} 失败`);
      closeImportModal();
      loadPageData();
    } catch(err) {
      showToast('解析失败: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
};

let userSearch = '';
let showUserModal = false;
let editingUser = null;

async function loadUsers() {
  const offset = (users.page - 1) * users.pageSize;
  
  // 从 tryon_records 聚合用户数据
  const recordsRes = await supabaseQuery('tryon_records', { select: 'user_id,status,created_at', limit: 9999 });
  const allRecords = recordsRes.data || [];
  
  // 按 user_id 分组统计
  const userMap = {};
  const today = new Date().toISOString().split('T')[0];
  for (const r of allRecords) {
    const uid = r.user_id;
    if (!uid) continue;
    if (!userMap[uid]) userMap[uid] = { user_id: uid, total: 0, today: 0 };
    userMap[uid].total++;
    if (r.created_at && r.created_at.startsWith(today) && r.status === 'completed') userMap[uid].today++;
  }
  
  let list = Object.values(userMap);
  if (userSearch) {
    list = list.filter(u => u.user_id.toLowerCase().includes(userSearch.toLowerCase()));
  }
  
  users.total = list.length;
  users.list = list.slice(offset, offset + users.pageSize);
  
  // 获取用户额度配置
  const quotaRes = await supabaseQuery('api_config', { select: '*', limit: 9999 });
  const quotas = {};
  for (const c of (quotaRes.data || [])) {
    if (c.config_key.startsWith('quota_')) {
      quotas[c.config_key.replace('quota_', '')] = parseInt(c.config_value) || 10;
    }
  }
  users.list.forEach(u => { u.max_count = quotas[u.user_id] || 10; u.remaining = Math.max(0, u.max_count - u.today); });
}

  if (!apiLogs.list.length) {
    return `
      <div>
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-bold">API 调用日志</h2>
        </div>
        <div class="card p-8 text-center text-gray-400">
          <p class="mb-2">📋</p>
          <p>暂无 API 调用日志数据</p>
          <p class="text-sm mt-2">API 日志需要在后端记录，当前直接查询 Supabase 暂无数据</p>
        </div>
      </div>`;
  }
  return `
    <div>
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">API 调用日志 (${apiLogs.total})</h2>
      </div>
      <div class="card overflow-hidden">
        <table class="w-full text-sm">
          <thead><tr class="text-left text-gray-500 border-b bg-gray-50">
            <th class="p-4">时间</th><th class="p-4">接口</th><th class="p-4">状态</th><th class="p-4">耗时</th><th class="p-4">错误</th>
          </tr></thead>
          <tbody>
            ${apiLogs.list.map(l => `
              <tr class="border-b border-gray-50 table-row">
                <td class="p-4">${formatTime(l.created_at)}</td>
                <td class="p-4 font-mono text-xs">${l.endpoint || '-'}</td>
                <td class="p-4">${l.status === 'success' ? '<span class="badge badge-green">成功</span>' : '<span class="badge badge-red">失败</span>'}</td>
                <td class="p-4">${l.duration || '-'}ms</td>
                <td class="p-4 text-red-500 text-xs">${l.error || '-'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div class="p-4 border-t flex justify-between items-center">
          <span class="text-sm text-gray-500">共 ${apiLogs.total} 条，第 ${apiLogs.page}/${totalPages} 页</span>
          <div class="flex gap-2">
            <button onclick="changeApiLogPage(${apiLogs.page-1})" ${apiLogs.page<=1?'disabled':''} class="btn-secondary">上一页</button>
            <button onclick="changeApiLogPage(${apiLogs.page+1})" ${apiLogs.page>=totalPages?'disabled':''} class="btn-secondary">下一页</button>
          </div>
        </div>
      </div>
    </div>`;
}

window.changeApiLogPage = function(p) {
  const totalPages = Math.ceil(apiLogs.total / apiLogPageSize) || 1;
  if (p < 1 || p > totalPages) return;
  apiLogPage = p;
  loadPageData();
};
window.bindApiLogs = function() {};

// ===================== Helpers =====================
function renderStatusBadge(status) {
  const map = {
    completed: '<span class="badge badge-green">成功</span>',
    pending: '<span class="badge badge-blue">处理中</span>',
    failed: '<span class="badge badge-red">失败</span>',
    processing: '<span class="badge badge-blue">处理中</span>',
    success: '<span class="badge badge-green">成功</span>',
  };
  return map[status] || `<span class="badge badge-gray">${status}</span>`;
}

function formatTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ===================== Init =====================
window.addEventListener('hashchange', () => {
  const page = window.location.hash.replace('#', '') || 'dashboard';
  if (page !== currentPage) { currentPage = page; render(); }
});
window.addEventListener('DOMContentLoaded', () => {
  const page = window.location.hash.replace('#', '') || 'dashboard';
  currentPage = page;
  render();
});
</script>
</body>
</html>
